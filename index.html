<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHILL BAR - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: { gold: '#F3C06B', dark: '#0a0a0a', card: '#111111' },
        boxShadow: {
          neon: '0 0 15px rgba(243,192,107,0.4), 0 0 40px rgba(243,192,107,0.12)',
          'neon-sm': '0 0 8px rgba(243,192,107,0.25)'
        }
      }
    }
  }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
/* ─── CSS VARIABLES ─────────────────────────────────── */
/* FIX: были не определены, из-за этого не работали var(--chill-gold) и т.д. */
:root {
  --chill-gold: #F3C06B;
  --chill-dark-1: #0a0a0a;
  --chill-dark-2: #111111;
  --chill-crimson: #dc2626;
}

/* ─── BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.03em;
  background: #0a0a0a;
  color: #f0f0f0;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ─── LIGHT THEME ──────────────────────────────────── */
body.light { background: #f4f2ed; color: #1a1a1a; }
body.light .hero-fade { background: linear-gradient(to top, #f4f2ed, transparent); }
body.light .nav-wrap {
  background: rgba(244,242,237,0.88) !important;
  border-color: rgba(243,192,107,0.2) !important;
}
body.light .menu-card {
  background: rgba(255,255,255,0.85);
  border-color: rgba(243,192,107,0.15);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
body.light .menu-card:hover { border-color: rgba(243,192,107,0.5); }
body.light .ctrl-pill { background: rgba(255,255,255,0.95); border-color: rgba(243,192,107,0.3); }
body.light .ctrl-pill svg { color: #a07820; }
body.light .lang-wrap { background: rgba(255,255,255,0.95); border-color: rgba(243,192,107,0.3); }
body.light .lang-btn { color: rgba(140,100,20,0.5); }
body.light .adm-input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #1a1a1a; }
body.light .modal-box { background: rgba(250,248,243,0.99); }
body.light .adm-section { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.07); }
body.light .footer-text { color: rgba(100,80,20,0.35); }

/* ─── SCROLLBAR HIDE ───────────────────────────────── */
.no-scroll::-webkit-scrollbar { display: none; }
.no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

/* ─── HERO ─────────────────────────────────────────── */
.hero-bg {
  position: relative;
  min-height: 52vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(8,5,18,0.55) 0%, rgba(90,22,44,0.72) 55%, rgba(8,5,18,0.92) 100%),
    url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
}

.hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
  opacity: 0.12;
  animation: drift 80s linear infinite;
  pointer-events: none;
}

@keyframes drift { to { background-position: 400px 400px; } }

/* FIX: добавлен .logo-font как синоним .hero-title — раньше класс не существовал */
.hero-title, .logo-font {
  font-family: 'Pacifico', cursive;
  font-size: clamp(3.2rem, 9vw, 6rem);
  color: #F3C06B;
  text-shadow: 0 0 40px rgba(243,192,107,0.55), 0 0 80px rgba(243,192,107,0.2);
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.9s 0.1s ease forwards;
}

.hero-sub {
  font-size: 0.62rem;
  letter-spacing: 0.42em;
  color: rgba(243,192,107,0.55);
  font-weight: 600;
  text-transform: uppercase;
  margin-top: 0.6rem;
  opacity: 0;
  animation: fadeUp 0.9s 0.35s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.scroll-arrow {
  position: absolute;
  bottom: 1.75rem;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(243,192,107,0.4);
  font-size: 1.4rem;
  animation: bounce 2.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(7px); }
}

.hero-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 90px;
  background: linear-gradient(to top, #0a0a0a, transparent);
  pointer-events: none;
}
body.light .hero-fade { background: linear-gradient(to top, #f4f2ed, transparent); }

/* ─── CONTROLS ─────────────────────────────────────── */
.ctrl-pill {
  background: rgba(14,12,24,0.88);
  border: 1px solid rgba(243,192,107,0.22);
  border-radius: 0.875rem;
  padding: 0.6rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  color: #F3C06B;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ctrl-pill:hover {
  border-color: rgba(243,192,107,0.55);
  box-shadow: 0 0 12px rgba(243,192,107,0.2);
  transform: scale(1.05);
}

.lang-wrap {
  display: flex;
  gap: 2px;
  background: rgba(14,12,24,0.88);
  border: 1px solid rgba(243,192,107,0.22);
  border-radius: 0.875rem;
  padding: 4px;
  backdrop-filter: blur(10px);
}
.lang-btn {
  padding: 3px 9px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  border-radius: 0.5rem;
  border: none;
  background: transparent;
  color: rgba(243,192,107,0.35);
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: background 0.18s, color 0.18s;
}
.lang-btn.on { background: #F3C06B; color: #0a0a0a; }
.lang-btn:not(.on):hover { color: rgba(243,192,107,0.75); }

/* ─── NAV ──────────────────────────────────────────── */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(10,10,10,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(243,192,107,0.07);
  padding: 0.875rem 1rem;
  overflow-x: auto;
}

.nav-pill {
  display: inline-flex;
  align-items: center;
  padding: 7px 20px;
  border-radius: 9999px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: 1px solid rgba(243,192,107,0.18);
  color: rgba(243,192,107,0.45);
  background: transparent;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.22s ease;
}
.nav-pill:hover {
  border-color: rgba(243,192,107,0.55);
  color: #F3C06B;
  background: rgba(243,192,107,0.07);
}
.nav-pill.active {
  background: rgba(243,192,107,0.13);
  border-color: rgba(243,192,107,0.65);
  color: #F3C06B;
  box-shadow: 0 0 14px rgba(243,192,107,0.18);
}

/* ─── MENU CARDS ───────────────────────────────────── */
.menu-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(243,192,107,0.07);
  border-radius: 1rem;
  padding: 0.875rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: opacity 0.45s ease, transform 0.45s ease, border-color 0.28s, box-shadow 0.28s;
  opacity: 0;
  transform: translateY(18px);
}
.menu-card.show {
  opacity: 1;
  transform: translateY(0);
}
.menu-card.show:hover {
  border-color: rgba(243,192,107,0.38);
  box-shadow: 0 0 22px rgba(243,192,107,0.09), 0 6px 28px rgba(0,0,0,0.28);
  transform: translateY(-2px) scale(1.007);
}

.item-name {
  font-weight: 600;
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.item-desc {
  font-size: 0.72rem;
  color: rgba(180,160,120,0.5);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
body.light .item-desc { color: rgba(100,80,20,0.45); }

.price-tag {
  font-size: 1.2rem;
  font-weight: 700;
  color: #F3C06B;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'Oswald', sans-serif;
}
.price-tag .unit { font-size: 0.65rem; font-weight: 600; opacity: 0.75; margin-left: 2px; }

/* ─── CATEGORY HEADING ─────────────────────────────── */
.cat-title { font-size: 1.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #F3C06B; white-space: nowrap; }
.cat-line { flex: 1; height: 1px; background: rgba(243,192,107,0.12); }

/* ─── ADMIN MODAL ──────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-box {
  background: rgba(12,10,20,0.97);
  border: 1px solid rgba(243,192,107,0.28);
  border-radius: 1.5rem;
  padding: 1.5rem;
  max-width: 460px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(243,192,107,0.08), 0 24px 80px rgba(0,0,0,0.6);
  animation: modalPop 0.22s ease forwards;
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(0.94) translateY(-8px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

.adm-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 0.75rem;
  padding: 0.7rem 0.875rem;
  font-size: 0.82rem;
  color: #f0f0f0;
  font-family: 'Oswald', sans-serif;
  outline: none;
  transition: border-color 0.18s;
}
.adm-input:focus { border-color: rgba(243,192,107,0.6); }

.adm-section {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 0.875rem;
  padding: 0.875rem;
}

.btn-gold {
  width: 100%;
  background: linear-gradient(135deg, #d4922a, #F3C06B, #d4922a);
  background-size: 200% 100%;
  color: #0a0a0a;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.8rem;
  border-radius: 0.875rem;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  transition: background-position 0.4s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(243,192,107,0.25);
}
.btn-gold:hover {
  background-position: right center;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(243,192,107,0.35);
}

.btn-red {
  background: rgba(220,38,38,0.12);
  border: 1px solid rgba(220,38,38,0.35);
  color: #ef4444;
  border-radius: 0.55rem;
  padding: 0.45rem 0.875rem;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-red:hover { background: #dc2626; color: white; border-color: #dc2626; }

.btn-green {
  width: 100%;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
  color: #22c55e;
  padding: 0.6rem;
  border-radius: 0.625rem;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
}
.btn-green:hover { background: #16a34a; color: white; border-color: #16a34a; }

.btn-blue {
  width: 100%;
  background: rgba(59,130,246,0.12);
  border: 1px solid rgba(59,130,246,0.3);
  color: #60a5fa;
  padding: 0.5rem;
  border-radius: 0.55rem;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
}
.btn-blue:hover { background: #2563eb; color: white; border-color: #2563eb; }

.price-edit-active {
  border: 1.5px dashed rgba(243,192,107,0.7) !important;
  border-radius: 6px;
  padding: 2px 6px;
  cursor: text;
  animation: pulseBorder 2s ease-in-out infinite;
}
@keyframes pulseBorder {
  0%,100% { border-color: rgba(243,192,107,0.4); box-shadow: none; }
  50%      { border-color: #F3C06B; box-shadow: 0 0 10px rgba(243,192,107,0.35); }
}

/* ─── SKELETON ─────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: 1rem;
  height: 64px;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.sortable-ghost { opacity: 0.4; }
.drag-handle { cursor: grab; padding-right: 12px; font-size: 1.25rem; color: #F3C06B; }
.drag-handle:active { cursor: grabbing; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body id="app-body" class="pb-20">

    <!-- Edit Mode Bar -->
    <div id="edit-mode-bar" class="fixed top-0 left-0 right-0 z-[100] hidden items-center justify-between px-4 py-3 font-bold shadow-lg" style="background:var(--chill-gold);color:var(--chill-dark-1)">
        <span id="edit-mode-text" style="font-size:0.8rem;letter-spacing:0.06em"></span>
        <button onclick="app.admin.disablePriceEdit()" id="edit-mode-btn" style="background:#0a0a0a;color:white;padding:0.35rem 1rem;border-radius:0.6rem;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;border:none;cursor:pointer;font-family:'Oswald',sans-serif"></button>

    <!-- Theme Toggle (top-left) -->
    <div style="position:fixed;top:1rem;left:1rem;z-index:60">
        <button onclick="app.toggleTheme()" class="ctrl-pill" title="Сменить тему">
            <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
        </button>
    </div>

    <!-- Language Switcher (top-right) — FIX: этих кнопок вообще не было в HTML -->
    <div style="position:fixed;top:1rem;right:1rem;z-index:60">
        <div class="lang-wrap">
            <button id="btn-ru" class="lang-btn on" onclick="app.changeLanguage('ru')">RU</button>

    <!-- Hero -->
    <header class="hero-bg">
        <div class="relative z-10 text-center px-4">
            <h1 class="logo-font">Chill Bar</h1>

    <!-- Navigation -->
    <nav class="nav-wrap no-scroll">

    <!-- Menu Sections -->
    <main id="menu-sections" class="max-w-4xl mx-auto px-4 mt-8 space-y-16"></main>

    <!-- Footer -->
    <footer class="mt-24 text-center space-y-4 pb-8">

        <button onclick="app.auth.openAdminModal()" id="admin-panel-btn"
            style="font-size:10px;color:rgba(180,160,120,0.3);border:1px solid rgba(180,160,120,0.1);padding:4px 12px;border-radius:6px;background:transparent;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:0.1em;text-transform:uppercase;transition:all 0.2s"
            onmouseover="this.style.color='#F3C06B';this.style.borderColor='rgba(243,192,107,0.3)'"
            onmouseout="this.style.color='rgba(180,160,120,0.3)';this.style.borderColor='rgba(180,160,120,0.1)'">Admin Panel</button>
    </footer>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal-overlay hidden" onclick="if(event.target===this)app.auth.closeAdminModal()">
        <div class="modal-box no-scroll">
            <div class="flex justify-between items-center pb-4" style="border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:1rem">
                <h3 id="adm-title" style="font-size:0.72rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#F3C06B"></h3>
                <button onclick="app.auth.closeAdminModal()"
                    style="background:none;border:none;cursor:pointer;color:rgba(150,150,150,0.7);font-size:1.5rem;line-height:1;transition:color 0.18s;padding:0 4px"
                    onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='rgba(150,150,150,0.7)'">&times;</button>

            <div id="step-login" class="py-2 space-y-4">

                    <input type="email" id="admin-email" placeholder="admin@chillbar.az" class="adm-input">
                </div>
                <div>
                    <label for="admin-password" id="adm-label-pass" style="display:block;font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(150,150,150,0.7);font-weight:600;margin-bottom:8px"></label>
                    <input type="password" id="admin-password" placeholder="••••••••" class="adm-input">
                </div>
                <button onclick="app.auth.signIn()" id="adm-btn-login" class="btn-gold" style="margin-top:0.5rem"></button>
            </div>

            <div id="step-dashboard" class="hidden overflow-y-auto py-2 space-y-4"></div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    let db;

    const App = {
        config: {
            defaultLang: 'ru',
            scrollOffset: -80,
        },
        state: {
            currentLang: 'ru',
            menuData: { categories: {ru:[],en:[],az:[]}, items: {ru:[],en:[],az:[]} },
            currentUser: null,
            db: null,
            isPriceEditMode: false,
            isReorderingMode: false,
        },

        dom: {
            get: (id) => document.getElementById(id),
            query: (selector) => document.querySelector(selector),
            queryAll: (selector) => document.querySelectorAll(selector),
        },

        utils: {
            sanitize(str) {
                if (typeof str !== 'string') return '';
                const map = {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'};
                return str.replace(/[<>&"']/g, c => map[c]);
            },
        },

        data: {
            async fetchMenu() {
                const { data: categories, error: catError } = await App.state.db.from('categories').select('*');
                const { data: items, error: itemsError } = await App.state.db.from('items').select('*');

                if (catError || itemsError) {
                    console.error(catError || itemsError);
                    alert('Не удалось загрузить меню из базы данных.');
                    return false;
                }

                const newMenuData = { categories: {ru:[],en:[],az:[]}, items: {ru:[],en:[],az:[]} };
                categories.forEach(cat => {
                    newMenuData.categories.ru.push({ id: cat.id, name: cat.name_ru });
                    newMenuData.categories.en.push({ id: cat.id, name: cat.name_en });
                    newMenuData.categories.az.push({ id: cat.id, name: cat.name_az });
                });
                items.forEach(item => {
                    const priceStr = String(Number(item.price).toFixed(2)).replace('.00', '');
                    newMenuData.items.ru.push({ id: item.id, catId: item.category_id, name: item.name_ru, desc: item.desc_ru, price: priceStr, img: item.img_url });
                    newMenuData.items.en.push({ id: item.id, catId: item.category_id, name: item.name_en, desc: item.desc_en, price: priceStr, img: item.img_url });
                    newMenuData.items.az.push({ id: item.id, catId: item.category_id, name: item.name_az, desc: item.desc_az, price: priceStr, img: item.img_url });

        },

        auth: {
            async signIn() {
                const email = App.dom.get('admin-email').value;
                const password = App.dom.get('admin-password').value;
                const { error } = await App.state.db.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
            },
            async signOut() {
                const { error } = await App.state.db.auth.signOut();
                if (error) alert(error.message);
                else App.auth.closeAdminModal();
            },
            openAdminModal() {
                const modal = App.dom.get('admin-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                const t = App.translations[App.state.currentLang];
                App.dom.get('adm-title').textContent = t.admTitle;
                App.dom.get('adm-label-email').textContent = t.admLabelEmail;
                App.dom.get('adm-label-pass').textContent = t.admLabelPass;

        render: {
            skeletons() {
                let s = '';
                for (let i = 0; i < 3; i++) {
                    s += `<section class="space-y-4 opacity-30">
                        <div style="height:2rem;width:33%;background:#1e1e1e;border-radius:0.5rem;animation:shimmer 1.4s ease-in-out infinite;background-size:200% 100%;background-image:linear-gradient(90deg,#141414 25%,#1e1e1e 50%,#141414 75%)"></div>
                        <div class="grid sm:grid-cols-2 gap-4">
                            <div class="skeleton"></div><div class="skeleton"></div>
                            <div class="skeleton"></div><div class="skeleton"></div>
                        </div>
                    </section>`;
                }
                return s;
            },
            nav() {
                const container = App.dom.get('nav-container');
                const fragment = document.createDocumentFragment();
                const categories = App.state.menuData.categories[App.state.currentLang] || [];
                categories.forEach(cat => {
                    const link = document.createElement('a');
                    link.href = `#${cat.id}`;
                    link.className = 'nav-pill';
                    link.textContent = cat.name;
                    link.dataset.navId = cat.id;
                    fragment.appendChild(link);
                });
                container.innerHTML = '';
                container.appendChild(fragment);
            },
            itemCard(item) {
                const u = App.utils;
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.dataset.itemId = item.id;

                const dragHandle = App.state.isReorderingMode ? `<div class="drag-handle">☰</div>` : '';
                const imageHtml = item.img
                    ? `<img src="${u.sanitize(item.img)}" loading="lazy" style="width:48px;height:48px;object-fit:cover;border-radius:10px;flex-shrink:0" alt="">`
                    : '';

                card.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;padding-right:12px">
                        ${dragHandle}
                        ${imageHtml}
                        <div style="min-width:0">
                            <div class="item-name">${u.sanitize(item.name)}</div>
                            ${item.desc ? `<div class="item-desc">${u.sanitize(item.desc)}</div>` : ''}
                        </div>
                    </div>
                `;
                const priceWrapper = document.createElement('div');
                priceWrapper.style.flexShrink = '0';
                const priceSpan = document.createElement('span');
                priceSpan.className = 'price-tag';
                priceSpan.dataset.id = item.id;

                const isNumeric = item.price && !isNaN(String(item.price).replace(',', '.'));
                priceSpan.innerHTML = isNumeric
                    ? `${u.sanitize(item.price)}<span class="unit">AZN</span>`
                    : u.sanitize(item.price);

                if (App.state.isPriceEditMode) {
                    priceSpan.classList.add('price-edit-active');
                    priceSpan.dataset.price = item.price;
                    priceSpan.contentEditable = true;
                    priceSpan.onblur = App.admin.updatePrice;
                }
                priceWrapper.appendChild(priceSpan);
                card.appendChild(priceWrapper);
                return card;
            },
            async fullPage() {
                const sectionsContainer = App.dom.get('menu-sections');
                sectionsContainer.innerHTML = App.render.skeletons();

                const success = await App.data.fetchMenu();
                if (!success) return;

                requestAnimationFrame(() => {
                    App.render.nav();
                    const fragment = document.createDocumentFragment();
                    const categories = App.state.menuData.categories[App.state.currentLang] || [];
                    const items = App.state.menuData.items[App.state.currentLang] || [];

                    categories.forEach(cat => {
                        const section = document.createElement('section');
                        section.id = cat.id;
                        section.className = 'scroll-mt-24 space-y-4';
                        section.innerHTML = `
                            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem">
                                <h2 class="cat-title">${App.utils.sanitize(cat.name)}</h2>
                                <div class="cat-line"></div>
                            </div>
                        `;
                        const itemsGrid = document.createElement('div');
                        itemsGrid.className = 'grid sm:grid-cols-2 gap-4';
                        const categoryItems = items.filter(i => i.catId === cat.id);
                        if (categoryItems.length > 0) {
                            categoryItems.forEach(item => itemsGrid.appendChild(App.render.itemCard(item)));
                        } else {
                            itemsGrid.innerHTML = `<p style="font-size:0.75rem;color:rgba(150,150,150,0.5);font-style:italic;padding:0.5rem 0">${App.translations[App.state.currentLang].emptyCat}</p>`;
                        }
                        section.appendChild(itemsGrid);
                        fragment.appendChild(section);
                    });

                    sectionsContainer.innerHTML = '';
                    sectionsContainer.appendChild(fragment);
                    App.init.animations();
                    App.updateTexts();

                    // FIX: карточки не появлялись — не было IntersectionObserver для .show
                    const cardObs = new IntersectionObserver((entries) => {
                        entries.forEach((e, i) => {
                            if (e.isIntersecting) {
                                setTimeout(() => e.target.classList.add('show'), i * 40);
                                cardObs.unobserve(e.target);
                            }
                        });
                    }, { threshold: 0.06 });
                    App.dom.queryAll('.menu-card').forEach(card => cardObs.observe(card));
                });
            },
        },

                // Populate selects
                const cats = App.state.menuData.categories[App.state.currentLang] || [];

            set('footer-text', t.footer);
            set('adm-title', t.admTitle);
            set('edit-mode-text', t.editModeText);
            set('edit-mode-btn', t.editModeBtn);
        },

        init: {
            async once() {
                // Restore saved language
                const savedLang = localStorage.getItem('chill_bar_lang');
                if (savedLang && App.translations[savedLang]) App.state.currentLang = savedLang;
                App.dom.queryAll('.lang-btn').forEach(b => b.classList.toggle('on', b.id === `btn-${App.state.currentLang}`));

                // Restore saved theme
                const savedTheme = localStorage.getItem('chill_bar_theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light');
                    App.dom.get('icon-moon').classList.add('hidden');
                    App.dom.get('icon-sun').classList.remove('hidden');
                }

                App.state.db.auth.onAuthStateChange((_event, session) => {

                    if (_event === 'SIGNED_IN') App.auth.openAdminModal();

                await App.render.fullPage();

            animations() {
                App.dom.queryAll('a[href^="#"]').forEach(a => a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = App.dom.query(this.getAttribute('href'));
                    if (target) window.scrollTo({
                        top: target.getBoundingClientRect().top + window.pageYOffset + App.config.scrollOffset,
                        behavior: 'smooth'
                    });
                }));
                // FIX: было .nav-link — такого класса не существует, нужно .nav-pill
                const obs = new IntersectionObserver((es) => es.forEach(e => {
                    if (e.isIntersecting) {

        },
    };

    async function initializeSupabase() {
        try {
            console.log('Fetching config from /api/config...');
            const response = await fetch('/api/config');
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Failed to fetch server config: ${response.status} ${errorText}`);
            }
            const config = await response.json();
            if (config.error || !config.supabaseUrl || !config.supabaseKey) {
                throw new Error(`Invalid config from server: ${config.error || 'Missing keys'}`);
            }
            console.log('Config received, initializing Supabase client...');
            if (!window._supabaseClient) {
                window._supabaseClient = supabase.createClient(config.supabaseUrl, config.supabaseKey);
            }
            db = window._supabaseClient;
            App.state.db = db;
            return true;
        } catch (error) {
            console.error('Supabase initialization failed:', error);
            document.body.innerHTML = `
                <div style="font-family:sans-serif;color:#ef4444;text-align:center;margin-top:80px;padding:2rem">
                    <h1 style="font-size:1.5rem;margin-bottom:1rem">⚠ Could not connect to database</h1>
                    <p style="color:#aaa;max-width:480px;margin:0 auto">${error.message}</p>
                    <p style="color:#666;margin-top:1rem;font-size:0.9rem">Check that SUPABASE_URL and SUPABASE_ANON_KEY are set in Vercel project settings.</p>
                </div>`;
            return false;
        }
    }

    (async () => {
        const loaded = await initializeSupabase();
        if (loaded) {
            window.app = App;
            App.init.once()
        }
    })();

});
