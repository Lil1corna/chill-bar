<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHILL BAR - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: { gold: '#F3C06B', dark: '#0a0a0a', card: '#111111' },
        boxShadow: {
          neon: '0 0 15px rgba(243,192,107,0.4), 0 0 40px rgba(243,192,107,0.12)',
          'neon-sm': '0 0 8px rgba(243,192,107,0.25)'
        }
      }
    }
  }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
/* ─── CSS VARIABLES ─────────────────────────────────── */
/* FIX: были не определены, из-за этого не работали var(--chill-gold) и т.д. */
:root {
  --chill-gold: #F3C06B;
  --chill-dark-1: #0a0a0a;
  --chill-dark-2: #111111;
  --chill-crimson: #dc2626;
}

/* ─── BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.03em;
  background: #0a0a0a;
  color: #f0f0f0;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ─── LIGHT THEME ──────────────────────────────────── */
body.light { background: #f4f2ed; color: #1a1a1a; }
body.light .hero-fade { background: linear-gradient(to top, #f4f2ed, transparent); }
body.light .nav-wrap {
  background: rgba(244,242,237,0.88) !important;
  border-color: rgba(243,192,107,0.2) !important;
}
body.light .menu-card {
  background: rgba(255,255,255,0.85);
  border-color: rgba(243,192,107,0.15);
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
body.light .menu-card:hover { border-color: rgba(243,192,107,0.5); }
body.light .ctrl-pill { background: rgba(255,255,255,0.95); border-color: rgba(243,192,107,0.3); }
body.light .ctrl-pill svg { color: #a07820; }
body.light .lang-wrap { background: rgba(255,255,255,0.95); border-color: rgba(243,192,107,0.3); }
body.light .lang-btn { color: rgba(140,100,20,0.5); }
body.light .adm-input { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.1); color: #1a1a1a; }
body.light .modal-box { background: rgba(250,248,243,0.99); }
body.light .adm-section { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.07); }
body.light .footer-text { color: rgba(100,80,20,0.35); }

/* ─── SCROLLBAR HIDE ───────────────────────────────── */
.no-scroll::-webkit-scrollbar { display: none; }
.no-scroll { -ms-overflow-style: none; scrollbar-width: none; }

/* ─── HERO ─────────────────────────────────────────── */
.hero-bg {
  position: relative;
  min-height: 52vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(8,5,18,0.55) 0%, rgba(90,22,44,0.72) 55%, rgba(8,5,18,0.92) 100%),
    url('https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
}

.hero-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
  opacity: 0.12;
  animation: drift 80s linear infinite;
  pointer-events: none;
}

@keyframes drift { to { background-position: 400px 400px; } }

/* FIX: добавлен .logo-font как синоним .hero-title — раньше класс не существовал */
.hero-title, .logo-font {
  font-family: 'Pacifico', cursive;
  font-size: clamp(3.2rem, 9vw, 6rem);
  color: #F3C06B;
  text-shadow: 0 0 40px rgba(243,192,107,0.55), 0 0 80px rgba(243,192,107,0.2);
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp 0.9s 0.1s ease forwards;
}

.hero-sub {
  font-size: 0.62rem;
  letter-spacing: 0.42em;
  color: rgba(243,192,107,0.55);
  font-weight: 600;
  text-transform: uppercase;
  margin-top: 0.6rem;
  opacity: 0;
  animation: fadeUp 0.9s 0.35s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.scroll-arrow {
  position: absolute;
  bottom: 1.75rem;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(243,192,107,0.4);
  font-size: 1.4rem;
  animation: bounce 2.2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50%       { transform: translateX(-50%) translateY(7px); }
}

.hero-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 90px;
  background: linear-gradient(to top, #0a0a0a, transparent);
  pointer-events: none;
}
body.light .hero-fade { background: linear-gradient(to top, #f4f2ed, transparent); }

/* ─── CONTROLS ─────────────────────────────────────── */
.ctrl-pill {
  background: rgba(14,12,24,0.88);
  border: 1px solid rgba(243,192,107,0.22);
  border-radius: 0.875rem;
  padding: 0.6rem;
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  color: #F3C06B;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ctrl-pill:hover {
  border-color: rgba(243,192,107,0.55);
  box-shadow: 0 0 12px rgba(243,192,107,0.2);
  transform: scale(1.05);
}

.lang-wrap {
  display: flex;
  gap: 2px;
  background: rgba(14,12,24,0.88);
  border: 1px solid rgba(243,192,107,0.22);
  border-radius: 0.875rem;
  padding: 4px;
  backdrop-filter: blur(10px);
}
.lang-btn {
  padding: 3px 9px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  border-radius: 0.5rem;
  border: none;
  background: transparent;
  color: rgba(243,192,107,0.35);
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: background 0.18s, color 0.18s;
}
.lang-btn.on { background: #F3C06B; color: #0a0a0a; }
.lang-btn:not(.on):hover { color: rgba(243,192,107,0.75); }

/* ─── NAV ──────────────────────────────────────────── */
.nav-wrap {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(10,10,10,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(243,192,107,0.07);
  padding: 0.875rem 1rem;
  overflow-x: auto;
}

.nav-pill {
  display: inline-flex;
  align-items: center;
  padding: 7px 20px;
  border-radius: 9999px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: 1px solid rgba(243,192,107,0.18);
  color: rgba(243,192,107,0.45);
  background: transparent;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.22s ease;
}
.nav-pill:hover {
  border-color: rgba(243,192,107,0.55);
  color: #F3C06B;
  background: rgba(243,192,107,0.07);
}
.nav-pill.active {
  background: rgba(243,192,107,0.13);
  border-color: rgba(243,192,107,0.65);
  color: #F3C06B;
  box-shadow: 0 0 14px rgba(243,192,107,0.18);
}

/* ─── MENU CARDS ───────────────────────────────────── */
.menu-card {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(243,192,107,0.07);
  border-radius: 1rem;
  padding: 0.875rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  transition: opacity 0.45s ease, transform 0.45s ease, border-color 0.28s, box-shadow 0.28s;
  opacity: 0;
  transform: translateY(18px);
}
.menu-card.show {
  opacity: 1;
  transform: translateY(0);
}
.menu-card.show:hover {
  border-color: rgba(243,192,107,0.38);
  box-shadow: 0 0 22px rgba(243,192,107,0.09), 0 6px 28px rgba(0,0,0,0.28);
  transform: translateY(-2px) scale(1.007);
}
.menu-card-photo {
  display: block;
  align-items: stretch;
  justify-content: flex-start;
  overflow: hidden;
  padding: 0;
  min-height: 318px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.038), rgba(255,255,255,0.018)),
    rgba(255,255,255,0.024);
  border-color: rgba(243,192,107,0.11);
}
.menu-photo {
  position: relative;
  height: clamp(168px, 22vw, 218px);
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 35%, rgba(243,192,107,0.13), transparent 44%),
    linear-gradient(135deg, rgba(255,255,255,0.08), rgba(243,192,107,0.035)),
    #080a10;
}
.menu-photo::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom, rgba(4,6,10,0.08) 0%, rgba(6,8,14,0.24) 56%, rgba(6,8,14,0.62) 100%),
    radial-gradient(circle at 18% 15%, rgba(243,192,107,0.13), transparent 34%);
  pointer-events: none;
  z-index: 1;
}
.menu-photo::before {
  content: '';
  position: absolute;
  inset: -45% -30%;
  background: linear-gradient(110deg, transparent 38%, rgba(255,255,255,0.18) 50%, transparent 62%);
  transform: translateX(-70%) rotate(5deg);
  opacity: 0;
  pointer-events: none;
  z-index: 4;
}
.menu-card-photo.show:hover .menu-photo::before {
  animation: photoSheen 1.15s ease;
}
.menu-photo-backdrop {
  position: absolute;
  inset: -18px;
  width: calc(100% + 36px);
  height: calc(100% + 36px);
  object-fit: cover;
  opacity: 0.26;
  filter: blur(20px) saturate(0.8) brightness(0.72);
  transform: scale(1.06);
}
.menu-photo-img {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: block;
  object-fit: contain;
  padding: 0.7rem;
  transform: scale(1);
  filter: saturate(0.96) contrast(1.04);
  transition: filter 0.45s ease;
}
.menu-card-photo.show .menu-photo-img {
  animation: photoReveal 0.75s ease both;
}
.menu-card-photo.show:hover .menu-photo-img {
  filter: saturate(1.05) contrast(1.08);
}
.menu-card-body {
  position: relative;
  display: grid;
  gap: 0.85rem;
  padding: 1.05rem 1.05rem 1.1rem;
  background:
    linear-gradient(180deg, rgba(7,10,18,0.92), rgba(5,7,12,0.98)),
    rgba(10,10,10,0.96);
  border-top: 1px solid rgba(243,192,107,0.13);
}
.menu-card-body::before {
  content: '';
  position: absolute;
  left: 1.05rem;
  right: 1.05rem;
  top: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(243,192,107,0.35), transparent);
  opacity: 0.65;
}
.menu-card-photo .item-name {
  font-size: 1rem;
  letter-spacing: 0.07em;
}
.menu-card-photo .item-desc {
  margin-top: 0.22rem;
  white-space: normal;
  line-height: 1.35;
}
.menu-card-photo .price-tag {
  font-size: 1.8rem;
  line-height: 1;
  letter-spacing: 0.01em;
}
.menu-card-photo .price-tag .unit {
  font-size: 0.72rem;
  margin-left: 4px;
}
.menu-card-price-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0.75rem;
}
.menu-card-price-row::before {
  content: '';
  flex: 1;
  height: 1px;
  margin-bottom: 0.35rem;
  background: linear-gradient(90deg, rgba(243,192,107,0.18), transparent);
}
.photo-drag-handle {
  position: absolute;
  left: 0.75rem;
  top: 0.75rem;
  z-index: 3;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  background: rgba(8,8,10,0.58);
}
@keyframes photoReveal {
  from { opacity: 0.72; transform: scale(0.975); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes photoSheen {
  0% { opacity: 0; transform: translateX(-70%) rotate(5deg); }
  18% { opacity: 0.55; }
  100% { opacity: 0; transform: translateX(70%) rotate(5deg); }
}

.item-name {
  font-weight: 600;
  font-size: 0.875rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.item-desc {
  font-size: 0.72rem;
  color: rgba(180,160,120,0.5);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
body.light .item-desc { color: rgba(100,80,20,0.45); }

.price-tag {
  font-size: 1.2rem;
  font-weight: 700;
  color: #F3C06B;
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'Oswald', sans-serif;
}
.price-tag .unit { font-size: 0.65rem; font-weight: 600; opacity: 0.75; margin-left: 2px; }

/* ─── CATEGORY HEADING ─────────────────────────────── */
.cat-title { font-size: 1.25rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #F3C06B; white-space: nowrap; }
.cat-line { flex: 1; height: 1px; background: rgba(243,192,107,0.12); }

/* ─── ADMIN MODAL ──────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 50% 0%, rgba(243,192,107,0.08), transparent 34%),
    rgba(0,0,0,0.88);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(0.75rem, 3vw, 1.25rem);
}
.modal-box {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)),
    rgba(12,10,20,0.97);
  border: 1px solid rgba(243,192,107,0.32);
  border-radius: 1.25rem;
  padding: clamp(1rem, 2.6vw, 1.5rem);
  max-width: 560px;
  width: 100%;
  max-height: min(94vh, 820px);
  overflow-y: auto;
  box-shadow: 0 0 60px rgba(243,192,107,0.1), 0 24px 90px rgba(0,0,0,0.68);
  animation: modalPop 0.22s ease forwards;
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(0.94) translateY(-8px); }
  to   { opacity: 1; transform: scale(1)    translateY(0); }
}

.adm-input {
  width: 100%;
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0.75rem;
  padding: 0.74rem 0.875rem;
  font-size: 0.82rem;
  color: #f0f0f0;
  font-family: 'Oswald', sans-serif;
  outline: none;
  min-height: 42px;
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
}
.adm-input:focus {
  background: rgba(255,255,255,0.075);
  border-color: rgba(243,192,107,0.64);
  box-shadow: 0 0 0 3px rgba(243,192,107,0.08);
}
.adm-input::placeholder { color: rgba(230,220,200,0.34); }
.adm-input[type="file"] {
  cursor: pointer;
  color: rgba(245,245,245,0.82);
}
.adm-input[type="file"]::file-selector-button {
  margin-right: 0.75rem;
  border: 1px solid rgba(243,192,107,0.32);
  border-radius: 0.55rem;
  background: rgba(243,192,107,0.1);
  color: #F3C06B;
  padding: 0.45rem 0.7rem;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
}

.adm-section {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.014));
  border: 1px solid rgba(255,255,255,0.075);
  border-radius: 0.875rem;
  padding: 0.88rem;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
}
.modal-box #step-dashboard > * + * { margin-top: 0.85rem !important; }
.adm-dashboard-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  padding-bottom: 1rem;
  margin-bottom: 0.65rem;
  border-bottom: 1px solid rgba(243,192,107,0.13);
}
.adm-kicker {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(180,180,180,0.48);
  margin-bottom: 5px;
}
.adm-section-title {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #F3C06B;
  margin-bottom: 8px;
}
.adm-field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.adm-action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.adm-row {
  display: flex;
  gap: 8px;
  align-items: stretch;
}
.adm-file-panel {
  display: grid;
  grid-template-columns: 66px 1fr;
  gap: 10px;
  align-items: center;
  border: 1px dashed rgba(243,192,107,0.2);
  border-radius: 0.875rem;
  padding: 0.65rem;
  background: rgba(243,192,107,0.035);
}
.adm-file-preview {
  width: 66px;
  aspect-ratio: 1;
  border-radius: 0.75rem;
  border: 1px solid rgba(243,192,107,0.18);
  background:
    linear-gradient(135deg, rgba(243,192,107,0.14), rgba(255,255,255,0.025)),
    rgba(0,0,0,0.26);
  display: grid;
  place-items: center;
  overflow: hidden;
  color: rgba(243,192,107,0.65);
  font-size: 1.25rem;
  font-weight: 700;
}
.adm-file-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.adm-danger-zone {
  border-color: rgba(220,38,38,0.18);
  background: linear-gradient(180deg, rgba(220,38,38,0.045), rgba(255,255,255,0.012));
}

.btn-gold {
  width: 100%;
  background: linear-gradient(135deg, #d4922a, #F3C06B, #d4922a);
  background-size: 200% 100%;
  color: #0a0a0a;
  font-weight: 800;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.8rem;
  border-radius: 0.875rem;
  border: none;
  cursor: pointer;
  font-size: 0.82rem;
  transition: background-position 0.4s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(243,192,107,0.25);
}
.btn-gold:hover {
  background-position: right center;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(243,192,107,0.35);
}

.btn-red {
  background: rgba(220,38,38,0.12);
  border: 1px solid rgba(220,38,38,0.35);
  color: #ef4444;
  border-radius: 0.55rem;
  padding: 0.55rem 0.875rem;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-red:hover { background: #dc2626; color: white; border-color: #dc2626; }

.btn-green {
  width: 100%;
  background: rgba(34,197,94,0.12);
  border: 1px solid rgba(34,197,94,0.3);
  color: #22c55e;
  padding: 0.72rem;
  border-radius: 0.625rem;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
}
.btn-green:hover { background: #16a34a; color: white; border-color: #16a34a; }

.btn-blue {
  width: 100%;
  background: rgba(59,130,246,0.12);
  border: 1px solid rgba(59,130,246,0.3);
  color: #60a5fa;
  padding: 0.62rem;
  border-radius: 0.55rem;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Oswald', sans-serif;
  transition: all 0.18s;
}
.btn-blue:hover { background: #2563eb; color: white; border-color: #2563eb; }

.price-edit-active {
  border: 1.5px dashed rgba(243,192,107,0.7) !important;
  border-radius: 6px;
  padding: 2px 7px;
  cursor: text;
  background: rgba(243,192,107,0.08);
  animation: pulseBorder 2s ease-in-out infinite;
}
@keyframes pulseBorder {
  0%,100% { border-color: rgba(243,192,107,0.4); box-shadow: none; }
  50%      { border-color: #F3C06B; box-shadow: 0 0 10px rgba(243,192,107,0.35); }
}

/* ─── SKELETON ─────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border-radius: 1rem;
  height: 64px;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.sortable-ghost { opacity: 0.42; }
.menu-card.reorder-card {
  background: rgba(255,255,255,0.045);
  border-color: rgba(243,192,107,0.18);
  box-shadow: 0 0 18px rgba(243,192,107,0.06);
  opacity: 1;
  transform: none;
}
.menu-card-photo.reorder-card {
  border-color: rgba(243,192,107,0.28);
}
.menu-card.reorder-card.show:hover {
  transform: translateY(0);
}
.drag-handle {
  cursor: grab;
  width: 32px;
  height: 32px;
  border-radius: 0.65rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding-right: 0;
  font-size: 1.05rem;
  color: #F3C06B;
  background: rgba(243,192,107,0.08);
  border: 1px solid rgba(243,192,107,0.16);
  flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }
.price-value { display: inline-block; min-width: 1ch; }
.price-value[contenteditable="true"],
.editable-text[contenteditable="true"] { outline: none; }
.price-saving { opacity: 0.55; pointer-events: none; }
.editable-text.text-edit-active {
  display: inline-block;
  max-width: 100%;
  border-radius: 0.45rem;
  cursor: text;
  box-shadow: 0 1px 0 rgba(243,192,107,0.42);
  transition: color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}
.editable-text.text-edit-active:hover,
.editable-text.text-edit-active:focus {
  color: #ffd891;
  background: rgba(243,192,107,0.08);
  box-shadow: 0 0 0 1px rgba(243,192,107,0.28), 0 0 16px rgba(243,192,107,0.08);
}
.cat-title.editable-text.text-edit-active {
  padding: 0.12rem 0.35rem;
  margin-left: -0.35rem;
}
.item-name.editable-text.text-edit-active {
  padding: 0.08rem 0.22rem;
  margin-left: -0.22rem;
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  line-height: 1.25;
}
.text-saving { opacity: 0.55; pointer-events: none; }
.btn-busy,
.btn-busy:hover {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none !important;
  box-shadow: none !important;
}
.btn-busy { pointer-events: none; }
.loader-chip {
  position: fixed;
  left: 50%;
  bottom: 1.1rem;
  transform: translateX(-50%);
  z-index: 130;
  display: none;
  align-items: center;
  gap: 10px;
  padding: 0.7rem 1rem;
  border-radius: 9999px;
  border: 1px solid rgba(243,192,107,0.25);
  background: rgba(12,10,20,0.96);
  color: #F3C06B;
  box-shadow: 0 10px 40px rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
}
.loader-chip.show { display: flex; }
.inline-spinner {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(243,192,107,0.2);
  border-top-color: #F3C06B;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast-stack {
  position: fixed;
  right: 1rem;
  bottom: 1rem;
  z-index: 140;
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  max-width: min(92vw, 380px);
}
.toast {
  padding: 0.9rem 1rem 0.9rem 0.95rem;
  border-radius: 0.875rem;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(12,10,20,0.95);
  color: #f5f5f5;
  box-shadow: 0 14px 40px rgba(0,0,0,0.35);
  backdrop-filter: blur(12px);
  opacity: 0;
  transform: translateY(8px);
  animation: toastIn 0.18s ease forwards;
}
.toast-success { border-color: rgba(34,197,94,0.35); color: #bbf7d0; }
.toast-error { border-color: rgba(239,68,68,0.35); color: #fecaca; }
.toast-info { border-color: rgba(96,165,250,0.35); color: #bfdbfe; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.sortable-chosen { box-shadow: 0 0 22px rgba(243,192,107,0.18); }
@media (max-width: 640px) {
  .menu-card-photo {
    min-height: 286px;
  }
  .menu-photo {
    height: 178px;
  }
  .menu-card-body {
    padding: 0.95rem 0.95rem 1rem;
    gap: 0.75rem;
  }
  .menu-card-photo .price-tag {
    font-size: 1.62rem;

  .modal-overlay {
    align-items: flex-end;

  }

    border-radius: 1.15rem;
    max-height: 92vh;
  }
  .adm-dashboard-head,
  .adm-row,
  .adm-field-grid,
  .adm-action-grid,
  .adm-file-panel {
    grid-template-columns: 1fr;
  }
  .adm-dashboard-head {
    display: grid;
  }
  .adm-row {
    flex-direction: column;
  }
  .adm-file-panel {
    display: grid;
  }

    width: 100%;
    max-height: 150px;
  }
  .toast-stack {
    left: 0.75rem;
    right: 0.75rem;
    bottom: 0.75rem;
    max-width: none;
  }
}

<script>
document.addEventListener('DOMContentLoaded', () => {

    let db;

    const App = {
        config: {
            defaultLang: 'ru',
            scrollOffset: -80,
            storageBucket: 'menu-images',
        },
        state: {
            currentLang: 'ru',
            menuData: { categories: {ru:[],en:[],az:[]}, items: {ru:[],en:[],az:[]} },
            currentUser: null,
            db: null,
            supabaseConfig: { url: '', keyPreview: '', projectRef: '', storageBucket: 'menu-images' },
            debugSupabase: false,
            isPriceEditMode: false,
            isReorderingMode: false,
            hasPositionColumn: null,
            sortables: [],
            pendingActions: new Set(),
            loadingCount: 0,
        },

        dom: {
            get: (id) => document.getElementById(id),
            query: (selector) => document.querySelector(selector),
            queryAll: (selector) => document.querySelectorAll(selector),
        },

        utils: {
            sanitize(str) {
                if (typeof str !== 'string') return '';
                const map = {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'};
                return str.replace(/[<>&"']/g, c => map[c]);
            },
            formatPrice(value) {
                const number = Number(value);
                if (!Number.isFinite(number)) return '';
                return number.toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
            },
            parsePriceInput(value) {
                const raw = String(value ?? '').replace(',', '.').replace(/[^\d.]/g, '');
                if (!raw) return NaN;
                const firstDotIndex = raw.indexOf('.');
                const normalized = firstDotIndex === -1
                    ? raw
                    : raw.slice(0, firstDotIndex + 1) + raw.slice(firstDotIndex + 1).replace(/\./g, '');
                const [integer = '', decimal = ''] = normalized.split('.');
                const safe = decimal ? `${integer}.${decimal.slice(0, 2)}` : integer;
                return Number(safe);
            },
            normalizeEditablePrice(value) {
                const raw = String(value ?? '').replace(',', '.').replace(/[^\d.]/g, '');
                const firstDotIndex = raw.indexOf('.');
                if (firstDotIndex === -1) return raw;
                const integer = raw.slice(0, firstDotIndex);
                const decimal = raw.slice(firstDotIndex + 1).replace(/\./g, '').slice(0, 2);
                return decimal ? `${integer}.${decimal}` : `${integer}.`;
            },
            normalizeEditableText(value) {
                return String(value ?? '').replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
            },
            placeCaretAtEnd(element) {
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(element);
                range.collapse(false);
                selection.removeAllRanges();
                selection.addRange(range);
            },
            sortItems(list) {
                return [...list].sort((a, b) => {
                    const catCompare = String(a.catId).localeCompare(String(b.catId), undefined, { numeric: true });
                    if (catCompare !== 0) return catCompare;
                    const posA = Number.isFinite(Number(a.position)) ? Number(a.position) : Number.MAX_SAFE_INTEGER;
                    const posB = Number.isFinite(Number(b.position)) ? Number(b.position) : Number.MAX_SAFE_INTEGER;
                    if (posA !== posB) return posA - posB;
                    return String(a.id).localeCompare(String(b.id), undefined, { numeric: true });
                });
            },
            isSupportedImage(file) {
                if (!file) return false;
                const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
                const allowedExtensions = ['jpg', 'jpeg', 'png', 'webp'];
                const extension = String(file.name || '').split('.').pop().toLowerCase();
                return allowedTypes.includes(file.type) || allowedExtensions.includes(extension);
            },
            buildStoragePath(file) {
                const extension = String(file.name || 'jpg').split('.').pop().toLowerCase() || 'jpg';
                return `items/${Date.now()}-${Math.random().toString(36).slice(2, 10)}.${extension}`;
            },
            maskKey(key) {
                if (!key || key.length < 12) return 'not-set';
                return `${key.slice(0, 8)}...${key.slice(-6)}`;
            },
            projectRefFromUrl(url) {
                try {
                    return new URL(url).hostname.split('.')[0] || '';
                } catch (_error) {
                    return '';
                }
            },
            isPermissionError(error) {
                const status = Number(error?.status || error?.code || 0);
                const message = String(error?.message || error || '').toLowerCase();
                return [401, 403, 42501].includes(status)
                    || message.includes('row-level security')
                    || message.includes('permission denied')
                    || message.includes('not authorized')
                    || message.includes('jwt');
            },
            safeDebugPayload(payload) {
                if (payload instanceof File) {
                    return { name: payload.name, type: payload.type, size: payload.size };
                }
                if (Array.isArray(payload)) return payload.map(item => App.utils.safeDebugPayload(item));
                if (payload && typeof payload === 'object') {
                    return Object.fromEntries(Object.entries(payload).map(([key, value]) => [key, App.utils.safeDebugPayload(value)]));
                }
                return payload;
            },
        },

        ui: {
            notify(message, type = 'info', duration = 3200) {
                const container = App.dom.get('toast-container');
                if (!container || !message) return;
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                window.setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(8px)';
                    window.setTimeout(() => toast.remove(), 180);
                }, duration);
            },
            success(message) {
                App.ui.notify(message, 'success');
            },
            error(message) {
                App.ui.notify(message, 'error', 4500);
            },
            info(message) {
                App.ui.notify(message, 'info');
            },
            handleError(error, fallbackMessage) {
                console.error(error);
                const t = App.translations[App.state.currentLang];
                let message = error?.message || fallbackMessage || t.toastGenericError;
                if (App.utils.isPermissionError(error)) {
                    message = t.toastPermissionDenied;
                }
                App.ui.error(message);
            },
            setGlobalLoading(isLoading, message) {
                const loader = App.dom.get('global-loader');
                const text = App.dom.get('global-loader-text');
                if (!loader || !text) return;
                if (isLoading) {
                    App.state.loadingCount += 1;
                    text.textContent = message || App.translations[App.state.currentLang].loadingSave;
                    loader.classList.add('show');
                    return;
                }
                App.state.loadingCount = Math.max(0, App.state.loadingCount - 1);
                if (App.state.loadingCount === 0) {
                    loader.classList.remove('show');
                    text.textContent = App.translations[App.state.currentLang].loadingSave;
                }
            },
            setButtonBusy(button, isBusy, loadingText) {
                if (!button) return;
                if (isBusy) {
                    if (!button.dataset.originalText) button.dataset.originalText = button.textContent;
                    button.textContent = loadingText || button.textContent;
                    button.disabled = true;
                    button.classList.add('btn-busy');
                } else {
                    button.textContent = button.dataset.originalText || button.textContent;
                    button.disabled = false;
                    button.classList.remove('btn-busy');
                }
            },
        },

        debug: {
            log(title, details = {}) {
                if (!App.state.debugSupabase) return;
                console.groupCollapsed(`[CHILL BAR Supabase] ${title}`);
                Object.entries(details).forEach(([key, value]) => console.log(key, value));
                console.groupEnd();
            },
            request(table, operation, payload, response) {
                App.debug.log(`${table}.${operation}`, {
                    project: App.state.supabaseConfig.projectRef,
                    url: App.state.supabaseConfig.url,
                    table,
                    payload: App.utils.safeDebugPayload(payload),
                    response,
                });
            },
        },

        data: {
            async execute(table, operation, payload, request) {
                App.debug.request(table, operation, payload, { status: 'request' });
                const response = await request;
                App.debug.request(table, operation, payload, response);
                if (response.error) throw response.error;
                return response.data;
            },
            async requireAuthForMutation() {
                const { data, error } = await App.state.db.auth.getSession();
                if (error) throw error;
                App.state.currentUser = data?.session?.user || null;
                if (!App.state.currentUser) {
                    throw new Error(App.translations[App.state.currentLang].toastPermissionDenied);
                }
            },
            ensureSavedRecord(record, message) {
                if (!record) {
                    throw new Error(message || App.translations[App.state.currentLang].toastSaveNotConfirmed);
                }
                return record;
            },
            ensureSavedRows(rows, message) {
                if (!Array.isArray(rows) || rows.length === 0 || rows.some(row => !row)) {
                    throw new Error(message || App.translations[App.state.currentLang].toastSaveNotConfirmed);
                }
                return rows;
            },
            async fetchCategoryById(id) {
                const data = await App.data.execute(
                    'categories',
                    'select-by-id',
                    { id },
                    App.state.db.from('categories').select('*').eq('id', id).maybeSingle()
                );
                return data || null;
            },
            async fetchItemById(id) {
                const data = await App.data.execute(
                    'items',
                    'select-by-id',
                    { id },
                    App.state.db.from('items').select('*').eq('id', id).maybeSingle()
                );
                return data || null;
            },
            async fetchItemsByCategory(categoryId) {
                let query = App.state.db.from('items').select('*').eq('category_id', categoryId);
                if (App.state.hasPositionColumn) {
                    query = query.order('position', { ascending: true }).order('id', { ascending: true });
                }
                const data = await App.data.execute('items', 'select-by-category', { categoryId }, query);
                return data || [];
            },
            async assertNoCategory(id) {
                const category = await App.data.fetchCategoryById(id);
                if (category) throw new Error(App.translations[App.state.currentLang].toastDeleteNotConfirmed);
            },
            async assertNoItem(id) {
                const item = await App.data.fetchItemById(id);
                if (item) throw new Error(App.translations[App.state.currentLang].toastDeleteNotConfirmed);
            },
            async assertNoItemsInCategory(categoryId) {
                const items = await App.data.fetchItemsByCategory(categoryId);
                if (items.length > 0) throw new Error(App.translations[App.state.currentLang].toastDeleteNotConfirmed);
            },
            async detectPositionColumn() {
                if (App.state.hasPositionColumn !== null) return App.state.hasPositionColumn;
                const { error } = await App.state.db.from('items').select('position').limit(1);
                if (error) {
                    if (/position/i.test(error.message)) {
                        App.state.hasPositionColumn = false;
                        return false;
                    }
                    throw error;
                }
                App.state.hasPositionColumn = true;
                return true;
            },
            async fetchMenu() {
                const { data: categories, error: catError } = await App.state.db.from('categories').select('*');
                App.debug.request('categories', 'select-menu', null, { data: categories, error: catError });

                let itemsQuery = App.state.db.from('items').select('*');
                if (App.state.hasPositionColumn) {
                    itemsQuery = itemsQuery
                        .order('category_id', { ascending: true })
                        .order('position', { ascending: true })
                        .order('id', { ascending: true });
                }
                let { data: items, error: itemsError } = await itemsQuery;
                App.debug.request('items', 'select-menu', null, { data: items, error: itemsError });

                if (itemsError && App.state.hasPositionColumn && /position/i.test(itemsError.message)) {
                    App.state.hasPositionColumn = false;
                    ({ data: items, error: itemsError } = await App.state.db.from('items').select('*'));
                    App.debug.request('items', 'select-menu-without-position', null, { data: items, error: itemsError });
                }

                if (catError || itemsError) {
                    App.ui.handleError(catError || itemsError, App.translations[App.state.currentLang].toastMenuLoadError);
                    return false;
                }

                const newMenuData = { categories: {ru:[],en:[],az:[]}, items: {ru:[],en:[],az:[]} };
                categories.forEach(cat => {
                    newMenuData.categories.ru.push({ id: cat.id, name: cat.name_ru });
                    newMenuData.categories.en.push({ id: cat.id, name: cat.name_en });
                    newMenuData.categories.az.push({ id: cat.id, name: cat.name_az });
                });
                items.forEach(item => {
                    const priceStr = App.utils.formatPrice(item.price);
                    const baseItem = {
                        id: item.id,
                        catId: item.category_id,
                        price: priceStr,
                        img: item.img_url,
                        position: Number.isFinite(Number(item.position)) ? Number(item.position) : null,
                    };
                    newMenuData.items.ru.push({ ...baseItem, name: item.name_ru, desc: item.desc_ru });
                    newMenuData.items.en.push({ ...baseItem, name: item.name_en, desc: item.desc_en });
                    newMenuData.items.az.push({ ...baseItem, name: item.name_az, desc: item.desc_az });
                });

                ['ru', 'en', 'az'].forEach(lang => {
                    newMenuData.items[lang] = App.utils.sortItems(newMenuData.items[lang]);
                });
                App.state.menuData = newMenuData;
                return true;
            },
            async getNextPosition(categoryId) {
                if (!App.state.hasPositionColumn) return null;
                const data = await App.data.execute(
                    'items',
                    'select-next-position',
                    { categoryId },
                    App.state.db
                        .from('items')
                        .select('position')
                        .eq('category_id', categoryId)
                        .order('position', { ascending: false })
                        .limit(1)
                        .maybeSingle()
                );
                return Number(data?.position || 0) + 1;
            },
            async normalizeCategoryPositions(categoryId) {
                if (!App.state.hasPositionColumn) return;
                const data = await App.data.fetchItemsByCategory(categoryId);
                if (!data.length) return;
                const updates = (data || []).map((item, index) => App.data.execute(
                    'items',
                    'normalize-position',
                    { id: item.id, category_id: categoryId, position: index + 1 },
                    App.state.db
                        .from('items')
                        .update({ position: index + 1 })
                        .eq('id', item.id)
                        .eq('category_id', categoryId)
                        .select('id, category_id, position')
                        .maybeSingle()
                ));
                const results = await Promise.all(updates);
                App.data.ensureSavedRows(results, App.translations[App.state.currentLang].toastSaveNotConfirmed);
            },
            async verifyCategoryOrder(categoryId, orderedIds) {
                if (!App.state.hasPositionColumn) return;
                const items = await App.data.fetchItemsByCategory(categoryId);
                const savedIds = items.map(item => String(item.id));
                const sameOrder = orderedIds.every((id, index) => String(id) === savedIds[index]);
                const positionsOk = items.every((item, index) => Number(item.position) === index + 1);
                if (!sameOrder || !positionsOk) {
                    throw new Error(App.translations[App.state.currentLang].toastOrderNotConfirmed);
                }
            },
        },

        storage: {
            async uploadItemImage(file) {
                const t = App.translations[App.state.currentLang];
                if (!file) return '';
                if (!App.utils.isSupportedImage(file)) {
                    throw new Error(t.toastImageTypeError);
                }
                const bucket = App.state.supabaseConfig.storageBucket || App.config.storageBucket;
                const filePath = App.utils.buildStoragePath(file);
                App.debug.request('storage.objects', 'upload', { bucket, filePath, file }, { status: 'request' });
                const { data: uploadData, error: uploadError } = await App.state.db.storage
                    .from(bucket)
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: file.type || undefined,
                    });
                App.debug.request('storage.objects', 'upload', { bucket, filePath, file }, { data: uploadData, error: uploadError });
                if (uploadError) throw uploadError;
                const { data } = App.state.db.storage.from(bucket).getPublicUrl(filePath);
                App.debug.request('storage.objects', 'get-public-url', { bucket, filePath }, { data, error: null });
                if (!data?.publicUrl) {
                    throw new Error(t.toastImageUrlError);
                }
                return data.publicUrl;
            },
        },

            sanitizeTextInput(event) {
                const target = event.target;
                const normalized = String(target.textContent ?? '').replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ');
                if (target.textContent !== normalized) {
                    target.textContent = normalized;
                    App.utils.placeCaretAtEnd(target);
                }

            async updateEditableName(event, config) {
                const t = App.translations[App.state.currentLang];
                const target = event.target;
                const entityId = target.dataset.id;
                if (event.type === 'keydown') {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        target.blur();
                    }
                    if (event.key === 'Escape') {
                        event.preventDefault();
                        target.textContent = target.dataset.rawName || target.textContent;
                        target.blur();
                    }
                    return;
                }
                if (!entityId) return;
                const previousName = target.dataset.rawName || '';
                const newName = App.utils.normalizeEditableText(target.textContent);
                if (!newName) {
                    target.textContent = previousName;
                    App.ui.info(t.toastNameRequired);
                    return;
                }
                target.textContent = newName;
                if (newName === previousName) return;
                const langColumn = `name_${App.state.currentLang}`;
                const result = await App.admin.runAction(`${config.actionKey}-${entityId}-${App.state.currentLang}`, {
                    loadingMessage: t.loadingSave,

                App.admin.destroySortables();
                if (!App.state.isReorderingMode) return;
                App.dom.queryAll('[data-category-grid="true"]').forEach(grid => {
                    if (grid.querySelectorAll('.menu-card').length < 2) return;
                    const sortable = Sortable.create(grid, {
                        animation: 180,

                        ghostClass: 'sortable-ghost',

                        onEnd: App.admin.handleSortEnd,

            sanitizePriceInput(event) {
                const target = event.target;
                const normalized = App.utils.normalizeEditablePrice(target.textContent);
                if (target.textContent !== normalized) {
                    target.textContent = normalized;
                    App.utils.placeCaretAtEnd(target);
                }
            },
            async updatePrice(event) {
                const t = App.translations[App.state.currentLang];
                const target = event.target;
                const itemId = target.dataset.id;
                if (event.type === 'keydown') {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        target.blur();
                    }
                    if (event.key === 'Escape') {
                        event.preventDefault();
                        target.textContent = target.dataset.rawPrice || target.textContent;
                        target.blur();
                    }
                    return;
                }
                if (!itemId) return;
                const newPrice = App.utils.parsePriceInput(target.textContent);
                const previousPrice = target.dataset.rawPrice || '';
                if (Number.isNaN(newPrice)) {
                    target.textContent = previousPrice;
                    App.ui.info(t.toastInvalidPrice);
                    return;
                }
                const normalizedPrice = App.utils.formatPrice(newPrice);
                target.textContent = normalizedPrice;
                if (normalizedPrice === previousPrice) return;
                const result = await App.admin.runAction(`price-${itemId}`, {
                    loadingMessage: t.loadingSave,
                    mutation: true,
                }, async () => {
                    target.classList.add('price-saving');
                    await App.data.requireAuthForMutation();
                    const updated = await App.data.execute(
                        'items',
                        'update-price',
                        { id: itemId, price: newPrice },
                        App.state.db.from('items').update({ price: newPrice }).eq('id', itemId).select('id, price').maybeSingle()
                    );
                    App.data.ensureSavedRecord(updated, t.toastPermissionDenied);
                    const saved = await App.data.fetchItemById(itemId);
                    App.data.ensureSavedRecord(saved, t.toastSaveNotConfirmed);
                    if (App.utils.formatPrice(saved.price) !== normalizedPrice) {
                        throw new Error(t.toastSaveNotConfirmed);
                    }
                    target.dataset.rawPrice = normalizedPrice;
                    await App.admin.syncAfterMutation(t.toastPriceSaved);
                });
                target.classList.remove('price-saving');
                if (!result?.ok) {
                    target.textContent = previousPrice;
                }
            },
            async handleSortEnd(event) {
                const categoryId = event.to.dataset.categoryId;
                const orderedIds = [...event.to.querySelectorAll('.menu-card')].map(card => card.dataset.itemId);
                if (event.oldIndex === event.newIndex) return;
                const result = await App.admin.runAction(`reorder-${categoryId}`, {
                    loadingMessage: App.translations[App.state.currentLang].loadingOrder,
                    mutation: true,
                }, async () => {
                    App.admin.setSortablesDisabled(true);
                    await App.data.requireAuthForMutation();
                    const updates = orderedIds.map((itemId, index) =>
                        App.data.execute(
                            'items',
                            'update-position',
                            { id: itemId, category_id: categoryId, position: index + 1 },
                            App.state.db
                                .from('items')
                                .update({ position: index + 1 })
                                .eq('id', itemId)
                                .eq('category_id', categoryId)
                                .select('id, category_id, position')
                                .maybeSingle()
                        )
                    );
                    const results = await Promise.all(updates);
                    App.data.ensureSavedRows(results, App.translations[App.state.currentLang].toastOrderNotConfirmed);
                    await App.data.verifyCategoryOrder(categoryId, orderedIds);
                    await App.admin.syncAfterMutation(App.translations[App.state.currentLang].toastOrderSaved);
                });
                App.admin.setSortablesDisabled(false);
                if (!result?.ok) {
                    await App.render.fullPage();
                }
            },
        },

        init: {
            async once() {
                // Restore saved language
                const savedLang = localStorage.getItem('chill_bar_lang');
                if (savedLang && App.translations[savedLang]) App.state.currentLang = savedLang;
                App.dom.queryAll('.lang-btn').forEach(b => b.classList.toggle('on', b.id === `btn-${App.state.currentLang}`));

                // Restore saved theme
                const savedTheme = localStorage.getItem('chill_bar_theme');
                if (savedTheme === 'light') {
                    document.body.classList.add('light');
                    App.dom.get('icon-moon').classList.add('hidden');
                    App.dom.get('icon-sun').classList.remove('hidden');
                }

                // FIX: openAdminModal вызывался при каждом изменении auth state,
                // в т.ч. при загрузке страницы — теперь только при SIGNED_IN
                App.state.db.auth.onAuthStateChange((_event, session) => {

                    if (_event === 'SIGNED_OUT') App.auth.closeAdminModal();

                App.init.events();
                await App.render.fullPage();

                App.dom.queryAll('a[href^="#"]').forEach(a => a.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = App.dom.query(this.getAttribute('href'));
                    if (target) window.scrollTo({
                        top: target.getBoundingClientRect().top + window.pageYOffset + App.config.scrollOffset,
                        behavior: 'smooth'
                    });
                }));
                // FIX: было .nav-link — такого класса не существует, нужно .nav-pill
                const obs = new IntersectionObserver((es) => es.forEach(e => {
                    if (e.isIntersecting) {

                App.dom.get('admin-password').addEventListener('keydown', e => e.key === 'Enter' && App.auth.signIn());

    async function initializeSupabase() {
        try {
            const response = await fetch('/api/config');
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Failed to fetch server config: ${response.status} ${errorText}`);
            }
            const config = await response.json();
            const supabaseUrl = config.supabaseUrl || config.SUPABASE_URL;
            const supabaseKey = config.supabaseKey || config.SUPABASE_ANON_KEY;
            const storageBucket = config.storageBucket || config.supabaseStorageBucket || config.SUPABASE_STORAGE_BUCKET || App.config.storageBucket;
            if (config.error || !supabaseUrl || !supabaseKey) {
                throw new Error(`Invalid config from server: ${config.error || 'Missing keys'}`);
            }
            App.state.debugSupabase = ['localhost', '127.0.0.1', ''].includes(window.location.hostname)
                || new URLSearchParams(window.location.search).get('debugSupabase') === '1';
            App.state.supabaseConfig = {
                url: supabaseUrl,
                keyPreview: App.utils.maskKey(supabaseKey),
                projectRef: App.utils.projectRefFromUrl(supabaseUrl),
                storageBucket,
            };
            App.debug.log('config-loaded', {
                url: App.state.supabaseConfig.url,
                project: App.state.supabaseConfig.projectRef,
                keyPreview: App.state.supabaseConfig.keyPreview,
                storageBucket: App.state.supabaseConfig.storageBucket,
            });
            const existingConfig = window._supabaseClientConfig || {};
            if (!window._supabaseClient || existingConfig.url !== supabaseUrl || existingConfig.key !== supabaseKey) {
                App.debug.log('client-created', {
                    previousProject: existingConfig.url ? App.utils.projectRefFromUrl(existingConfig.url) : null,
                    nextProject: App.state.supabaseConfig.projectRef,
                });
                window._supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
                window._supabaseClientConfig = { url: supabaseUrl, key: supabaseKey };
            }
            db = window._supabaseClient;
            App.state.db = db;
            return true;
        } catch (error) {
            console.error('Supabase initialization failed:', error);
            document.body.innerHTML = `
                <div style="font-family:sans-serif;color:#ef4444;text-align:center;margin-top:80px;padding:2rem">
                    <h1 style="font-size:1.5rem;margin-bottom:1rem">⚠ Could not connect to database</h1>
                    <p style="color:#aaa;max-width:480px;margin:0 auto">${error.message}</p>
                    <p style="color:#666;margin-top:1rem;font-size:0.9rem">Check that SUPABASE_URL and SUPABASE_ANON_KEY are set in Vercel project settings.</p>
                </div>`;
            return false;
        }
    }

    (async () => {
        const loaded = await initializeSupabase();
        if (loaded) {
            window.app = App;
            App.init.once();
        }
    })();
